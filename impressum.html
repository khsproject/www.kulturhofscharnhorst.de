  <style>
    @font-face {
      font-family: 'Lostar';
      src: url('lostar.ttf') format('truetype');
    }
    @font-face {
      font-family: 'Nexa';
      src: url('nexa.ttf') format('truetype');
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background-color: #BDF0E6;
      font-family: 'Nexa', 'Jost', sans-serif;
      font-weight: 200;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: clamp(2rem, 5vw, 4rem) 2rem clamp(4rem, 8vw, 6rem);
      -webkit-text-size-adjust: 100%;
      overflow-x: hidden;
    }

    h1 {
      font-family: 'Lostar', 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.5rem, 8vw, 5rem);
      color: #D898E3;
      margin-bottom: 3rem;
      text-align: center;
    }

    .content {
      width: min(45%, 600px);
      color: #D898E3;
      font-size: clamp(0.9rem, 1.5vw, 1.1rem);
      line-height: 1.85;
    }

    .content h2 {
      font-family: 'Nexa', 'Jost', sans-serif;
      font-weight: 300;
      font-size: clamp(0.75rem, 1.2vw, 0.9rem);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #D898E3;
      opacity: 0.6;
      margin-top: 2.5rem;
      margin-bottom: 0.5rem;
    }

    .content p {
      margin-bottom: 0.3rem;
    }

    .content a {
      color: #D898E3;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .back {
      margin-top: 4rem;
      font-family: 'Lostar', 'Cormorant Garamond', serif;
      font-size: clamp(1rem, 1.5vw, 1.3rem);
      color: #D898E3;
      text-decoration: none;
      opacity: 0.8;
      transition: opacity 0.2s;
    }
    .back:hover { opacity: 1; }

    /* Wurzel-SVGs */
    .roots {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    .root-path {
      fill: none;
      stroke: #D898E3;
      stroke-width: 3;
      stroke-linecap: round;
      opacity: 0.65;
      stroke-dasharray: 2000;
      stroke-dashoffset: 2000;
      animation: grow 8s ease forwards;
    }

    .root-path.delay { animation-delay: 0.6s; }

    @keyframes grow { to { stroke-dashoffset: 0; } }

    @media (max-width: 768px) {
      .content { width: 85%; }
      h1 { font-size: clamp(2rem, 10vw, 3.5rem); margin-bottom: 2rem; }
    }

    @media (max-width: 600px) {
      body { padding: 1.5rem 1.5rem 3rem; }
      .content { width: 88%; font-size: 1rem; }
      .roots { display: none; }
    }

    @media (max-width: 480px) {
      .content { width: 92%; }
      .back { margin-top: 3rem; }
    }
  </style>
</head>
